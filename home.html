    /* Custom Top Nav to override Bootstrap */
    .top-nav {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 15px;
        z-index: 999; /* This forces the buttons to sit on top of the background image! */
    }
    .nav-btn {
        background-color: #CC3300 !important; 
        color: #FFF8DC !important;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: bold;
        text-transform: uppercase;
        text-decoration: none;
        transition: background-color 0.3s ease;
    }
    .nav-btn:hover {
        background-color: #A32900 !important;
        color: #FFF8DC !important;
    }
    .nav-btn:hover {
            background-color: #A32900 !important;
            color: #FFF8DC !important;

        /* Adds an intense black drop shadow to make the text pop over the tulips */
        .masthead-subheading {

        }
        .masthead-heading {
            text-shadow: 5px 5px 15px rgba(0, 0, 0, 1) !important;
